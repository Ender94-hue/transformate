<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transfórmate · Crear cuenta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <aside class="auth-hero">
      <div class="auth-hero-brand">Transfórmate <span>en quien quieres ser</span></div>

      <div class="auth-hero-content">
        <h1>Empieza tu<br/>transformación.</h1>
        <p>Crea tu cuenta y da el primer paso hacia la persona que quieres ser.</p>
      </div>

      <div class="auth-hero-footer">
        <span>🔒 Tu acceso, tu contraseña</span>
        <span>♾️ De por vida</span>
      </div>
    </aside>

    <main class="auth-form-side">
      <div class="auth-card">
        <h2>Crear mi cuenta</h2>
        <p class="sub">Tu acceso queda asociado a tu correo y a la contraseña que elijas.</p>

        <div id="error" class="error-msg"></div>
        <div id="success" class="error-msg" style="background:#E8F5E0;color:#3F7A2E"></div>

        <form id="registerForm" autocomplete="on">
          <div class="form-group">
            <label for="nombre">Tu nombre</label>
            <input type="text" id="nombre" placeholder="Ej. Sofía" required />
          </div>

          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="tu@correo.com" required />
          </div>

          <div class="form-group">
            <label for="password">Crea tu contraseña</label>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres" required />
          </div>

          <button type="submit" class="btn btn-primary">Crear mi cuenta</button>
        </form>

        <div class="auth-bottom">
          ¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (async () => {
      if (await usuarioActivo()) {
        window.location.href = 'dashboard.html';
        return;
      }

      const form = document.getElementById('registerForm');
      const errorBox = document.getElementById('error');
      const successBox = document.getElementById('success');
      const submitBtn = form.querySelector('button[type="submit"]');

      // Llega desde el pago en Stripe (funnel/VSL)
      const params = new URLSearchParams(window.location.search);
      if (params.get('paid') === '1') {
        successBox.innerHTML = '✓ <strong>¡Pago recibido!</strong> Crea tu cuenta con el <strong>MISMO correo</strong> que usaste para pagar y tendrás acceso inmediato a tu contenido.';
        successBox.classList.add('show');
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorBox.classList.remove('show');
        successBox.classList.remove('show');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Creando…';

        const r = await registrarUsuario({
          nombre: document.getElementById('nombre').value,
          email:  document.getElementById('email').value,
          password: document.getElementById('password').value,
        });

        submitBtn.disabled = false;
        submitBtn.textContent = 'Crear mi cuenta';

        if (!r.ok) {
          errorBox.textContent = r.error;
          errorBox.classList.add('show');
          return;
        }

        successBox.textContent = '¡Cuenta creada! Te enviamos a tu espacio.';
        successBox.classList.add('show');

        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      });
    })();
  </script>
</body>
</html>
